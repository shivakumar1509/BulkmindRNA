server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static assets with far-future caching
  location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|ttf|woff|woff2|eot)$ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA routing: redirect all other requests to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: a small health endpoint (nginx will serve index)
  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Prevent clickjacking and basic security headers
  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";
  add_header X-XSS-Protection "1; mode=block";
}

